name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-package:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Lint Python
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python -m ruff check .

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Verify source distribution contents and installation
        run: |
          python -c "import glob, subprocess, sys, tarfile; sdists = glob.glob('dist/*.tar.gz'); assert len(sdists) == 1, sdists; names = tarfile.open(sdists[0]).getnames(); assert any(name.endswith('/examples/incident_triage.py') for name in names), names; assert any(name.endswith('/evals/golden/text_pipeline.json') for name in names), names; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', sdists[0]])"

      - name: Replace editable install with built wheel
        run: |
          python -m pip uninstall --yes ThreadSwarm
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); assert len(wheels) == 1, wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--no-deps', wheels[0]])"

      - name: Smoke test installed wheel outside checkout
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import importlib.util, threadswarm; assert importlib.util.find_spec('cv2') is None; print(threadswarm.__version__)"
          python -c "from pathlib import Path; import numpy as np; from threadswarm.engine.shared_memory import load_image; path = Path('sample.npy'); np.save(path, np.arange(4).reshape(2, 2)); assert load_image(path).shape == (2, 2)"
          threadswarm --help
          threadswarm eval-golden --json
          threadswarm demo incident-triage --json
